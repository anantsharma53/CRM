name: CI

# Basic sanity checks on every push/PR:
#  - Python: install deps, import server module (catches syntax errors + missing deps fast)
#  - Frontend: install + build (catches JS syntax + missing deps)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Import-check server.py
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///./ci.db"
          JWT_SECRET: "ci-secret"
        run: python -c "import server; print('server module OK — routes:', len(server.app.routes))"

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Build production bundle
        working-directory: frontend
        env:
          CI: "false"
          REACT_APP_BACKEND_URL: ""
        run: yarn build
